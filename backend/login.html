<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Répondly — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07070f; --surface: #0d0d1a; --card: #111120;
    --gold: #c9a84c; --gold-lt: #e8c96a;
    --text: #ede9df; --muted: #7a7a90; --border: rgba(255,255,255,0.07);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .logo {
    font-family: var(--serif); font-size: 1.5rem; font-weight: 700;
    color: var(--text); text-decoration: none; margin-bottom: 2.5rem;
    display: block; text-align: center;
  }
  .logo span { color: var(--gold); }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 2.5rem; width: 100%; max-width: 420px;
  }
  h1 { font-family: var(--serif); font-size: 1.8rem; font-weight: 700; margin-bottom: 0.4rem; }
  .sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; font-weight: 300; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; }
  input {
    width: 100%; padding: 0.65rem 0.9rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; font-size: 0.92rem; font-family: var(--sans);
    color: var(--text); transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: var(--gold); }
  input::placeholder { color: var(--muted); }
  .btn {
    width: 100%; padding: 0.75rem;
    background: var(--gold); color: #07070f;
    border: none; border-radius: 7px;
    font-size: 0.92rem; font-weight: 600; font-family: var(--sans);
    cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
  }
  .btn:hover { background: var(--gold-lt); }
  .hint { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: var(--muted); }
  .hint a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>

<a href="/" class="logo">Répondly<span>.</span></a>

<div class="card">
  <h1>Connexion</h1>
  <p class="sub">Bon retour.</p>

  <form method="POST" action="/login">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="vous@exemple.com" required autofocus>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Se connecter →</button>
  </form>

  <p class="hint">Pas encore de compte ? <a href="/register">Créer un compte</a></p>
</div>

</body>
</html>
