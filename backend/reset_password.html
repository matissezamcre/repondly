<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Répondly — Nouveau mot de passe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07070f; --surface: #0d0d1a; --card: #111120;
    --gold: #c9a84c; --gold-lt: #e8c96a;
    --text: #ede9df; --muted: #7a7a90; --border: rgba(255,255,255,0.07);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--text); text-decoration: none; margin-bottom: 2.5rem; display: block; text-align: center; }
  .logo span { color: var(--gold); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 2.5rem; width: 100%; max-width: 420px; }
  h1 { font-family: var(--serif); font-size: 1.8rem; font-weight: 700; margin-bottom: 0.4rem; }
  .sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; font-weight: 300; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; }
  input { width: 100%; padding: 0.65rem 0.9rem; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; font-size: 0.92rem; font-family: var(--sans); color: var(--text); transition: border-color 0.2s; }
  input:focus { outline: none; border-color: var(--gold); }
  .btn { width: 100%; padding: 0.75rem; background: var(--gold); color: #07070f; border: none; border-radius: 7px; font-size: 0.92rem; font-weight: 600; font-family: var(--sans); cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
  .btn:hover { background: var(--gold-lt); }
  .hint { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: var(--muted); }
  .hint a { color: var(--gold); text-decoration: none; }
  .msg { padding: 0.9rem 1rem; border-radius: 8px; font-size: 0.88rem; margin-bottom: 1.5rem; }
  .msg.ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #10b981; }
  .msg.err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
</style>
</head>
<body>

<a href="/" class="logo">Répondly<span>.</span></a>

<div class="card">
  <h1>Nouveau mot de passe</h1>
  <p class="sub">Choisissez un nouveau mot de passe.</p>

  <div id="msg" style="display:none" class="msg"></div>

  <form id="form">
    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="password" placeholder="Minimum 6 caractères" required autofocus>
    </div>
    <button type="submit" class="btn">Changer le mot de passe →</button>
  </form>

  <p class="hint"><a href="/login">← Retour à la connexion</a></p>
</div>

<script>
  const token = new URLSearchParams(location.search).get('token');
  if (!token) { location.href = '/forgot-password'; }

  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('.btn');
    btn.disabled = true; btn.textContent = 'Enregistrement...';
    const res = await fetch('/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token, password: document.getElementById('password').value })
    });
    const data = await res.json();
    const msg = document.getElementById('msg');
    if (data.ok) {
      msg.className = 'msg ok'; msg.textContent = 'Mot de passe changé ! Redirection...';
      msg.style.display = 'block'; document.getElementById('form').style.display = 'none';
      setTimeout(() => location.href = '/login', 2000);
    } else {
      btn.disabled = false; btn.textContent = 'Changer le mot de passe →';
      msg.className = 'msg err'; msg.textContent = data.error || 'Lien invalide ou expiré.';
      msg.style.display = 'block';
    }
  });
</script>
</body>
</html>
